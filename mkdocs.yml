site_name: PBE 26.1 - Sistema de Gestao de Estagios
site_author: Equipe PBE 26.1
repo_url: https://github.com/Projetos-de-Extensao/PBE-26.1_8001_VI
copyright: Copyright 2026, Equipe PBE 26.1

nav:
  - Home: index.md
  - Projeto:
      - Visao Geral: projeto.md
      - Pesquisa: Iniciacao/pesquisa.md
      - 5W2H: Iniciacao/5w2h.md
      - Brainstorm: Iniciacao/brainstorm.md
      - Metodologia: Iniciacao/metodologia.md
      - Mapa Mental: Iniciacao/mapa_mental.md
  - Fases:
      - Iniciacao: Iniciacao/index.md
      - Elaboracao: Elaboracao/index.md
      - Construcao: Construcao/index.md
      - Transicao: Transicao/index.md
  - Apoio:
      - MkDocs: mkdocs.md
      - Bibliografia: bibliografia.md

extra_css:
  - css/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ''
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true
  - plantuml_markdown:
      server: http://www.plantuml.com/plantuml

plugins:
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
  - minify:
      minify_html: true
  - search

theme:
  name: material
  language: pt-BR
  logo: assets/Ibmec_logo.png
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/toggle-switch
        name: Alternar tema
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/toggle-switch-off
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/toggle-switch
        name: Usar tema claro
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
